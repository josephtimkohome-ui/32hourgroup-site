<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Store — 32 Hour Group</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .store-body { max-width: 1200px; margin: 0 auto; padding: 80px 56px; }
  .store-intro { max-width: 640px; margin-bottom: 80px; }
  .store-intro-text { font-size: 19px; font-weight: 300; line-height: 1.9; color: var(--light); }

  /* CATEGORY HEADER */
  .store-category { margin-bottom: 80px; }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .category-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--white);
  }
  .category-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* FREE DOWNLOADS */
  .downloads-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
  }
  .download-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.3s;
  }
  .download-card:hover { border-color: var(--gold-dim); }
  .download-icon { font-size: 36px; margin-bottom: 20px; }
  .download-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 10px;
  }
  .download-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 12px;
  }
  .download-desc {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--grey);
    flex: 1;
    margin-bottom: 28px;
  }
  .download-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .download-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--grey);
  }
  .download-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    background: var(--gold);
    padding: 10px 22px;
    text-decoration: none;
    transition: all 0.3s;
    display: inline-block;
  }
  .download-btn:hover { background: var(--white); }

  /* WHAT YOU NEED NOTE */
  .download-note {
    background: var(--dark);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 24px 28px;
    margin-top: 2px;
    margin-bottom: 80px;
  }
  <!-- MERCH -->
  <div class="store-category merch-section reveal">
    <div class="category-header">
      <div class="category-title">Merch</div>
      <div class="category-label">Live Store</div>
    </div>
    <div class="merch-iframe-wrap">
      <div class="merch-bar">
        <span class="merch-bar-label">32 Hour Group · Official Merch</span>
        <a href="https://32hourgroup.creator-spring.com/" target="_blank" class="merch-bar-link">Open in new tab ↗</a>
      </div>
      <iframe
        src="https://32hourgroup.creator-spring.com/"
        title="32 Hour Group Merch Store"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </div>
  </div>

</div>

<footer>
  <a href="index.html" class="footer-logo"><img src="/assets/images/logo.png" alt="32 Hour Group" class="footer-logo-img"></a>
  <ul class="footer-links">
    <li><a href="principles.html">Principles</a></li>
    <li><a href="manifesto.html">Manifesto</a></li>
    <li><a href="commandments.html">Commandments</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="initiation.html">Initiate</a></li>
    <li><a href="store.html">Store</a></li>
  </ul>
  <div class="footer-copy">© 2025 32 Hour Group</div>
</footer>

<script>
  const nav = document.getElementById("nav");
  window.addEventListener("scroll", () => { nav.classList.toggle("scrolled", window.scrollY > 60); });
  document.querySelectorAll(".reveal").forEach(el => {
    new IntersectionObserver((e) => e.forEach(en => {
      if (en.isIntersecting) en.target.classList.add("visible");
    }), { threshold: 0.08 }).observe(el);
  });
</script>
</body>
</html>
